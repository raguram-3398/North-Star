name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .[dev]

      - name: ruff check
        run: |
          ruff check .

      - name: black --check
        run: |
          black --check .

      - name: mypy
        run: |
          mypy src/

      - name: pytest
        run: |
          pytest
